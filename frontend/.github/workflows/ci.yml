name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # DEBUG - VÊ SE O FICHEIRO É CRIADO
      - name: Debug environment files
        working-directory: ./frontend
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: false, supabaseUrl: 'debug-url', supabaseKey: 'debug-key', apiUrl: 'debug-api' };" > src/environments/environment.ts
          echo "=== LISTA DE FICHEIROS ==="
          ls -la src/environments/
          echo "=== CONTEÚDO DO FICHEIRO ==="
          cat src/environments/environment.ts
          echo "=== CAMINHO ATUAL ==="
          pwd
          echo "=== ESTRUTURA DO PROJETO ==="
          find src -name "*.ts" | head -10

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint