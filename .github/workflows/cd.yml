name: Vercel Production Deployment
on:
  push:
    branches:
      - main
      - develop

jobs:
  Deploy-Frontend:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate environment.ts
        run: |
          mkdir -p frontend/src/environments
          cat > frontend/src/environments/environment.ts <<EOF
          export const environment = {
            production: true,
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseKey: '${{ secrets.SUPABASE_ANON_KEY }}',
            apiUrl: '${{ secrets.API_URL }}'
          };
          EOF

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Project
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Prepare Vercel Output
        run: |
          mkdir -p .vercel/output/static
          cp -r frontend/dist/*/browser/* .vercel/output/static/ || cp -r frontend/dist/*/* .vercel/output/static/
          cat > .vercel/output/config.json <<EOF
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF
          
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}